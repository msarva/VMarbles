<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="product.css">
    <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
    <script src="projects.js" defer></script>
    <title>Projects</title>
</head>
<body>
    <header>
      <div id="navbar-container"></div>
    </header>

    <section class="featured">

        <div class="featured-top" id="slider-area">

            <div class="slide active"
                data-title="Luxury Living Room"
                data-text="Elegant marble flooring with modern interior aesthetics.">

                <img src="images/img1.png" alt="">
            </div>

            <div class="slide prev"
                data-title="Premium Kitchen Space"
                data-text="Sophisticated kitchen design with warm natural textures.">

                <img src="images/img2 (2).png" alt="">
            </div>

            <div class="slide next"
                data-title="Modern Bathroom Design"
                data-text="Minimal and refined marble ambiance for contemporary homes.">

                <img src="images/img3.png" alt="">
            </div>

            <button class="next-btn" id="next">
                <i class="fa-solid fa-arrow-right"></i>
            </button>

        </div>

        <div class="featured-content">

            <span class="tag">Featured</span>

            <h1 id="feature-title">
                Luxury Living Room
            </h1>

            <p id="feature-text">
                Elegant marble flooring with modern interior aesthetics.
            </p>

        </div>

</section>

        <section class="portfolio">

        <div class="portfolio-header">

            <h2>Our Portfolio</h2>

            <div class="heading-line"></div>

        </div>

        <div class="portfolio-tabs">
            <button class="active">All</button>
            <button>Hallway</button>
            <button>Kitchen</button>
            <button>Outdoor</button>
            <button>Bathroom</button>
            <button>Bedroom</button>
            <button>Workspaces</button>
        </div>

    </section>
    <section class="gallery-grid">

        <div class="grid-item tall">
            <img src="images/Rectangle 7.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 8.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 9.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 7.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 8.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 9.png">
        </div>

        <div class="grid-item tall">
            <img src="images/Rectangle 7.png">
        </div>

        <div class="grid-item wide">
            <img src="images/Rectangle 39.png">
        </div>

    </section>
            <div class="project-popup" id="projectPopup">

            <div class="popup-box">

                <button class="close-popup" id="closePopup">
                    ×
                </button>

                <div class="popup-left">

                    <button class="popup-arrow left">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>

                    <img
                        id="popupImage"
                        src="images/Rectangle 7.png"
                        alt=""
                    >

                    <button class="popup-arrow right">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>

                </div>

                <div class="popup-right">

                    <h2 id="popupTitle">
                        Indoor Project
                    </h2>

                    <p class="popup-subtitle">
                        name of home/org
                    </p>

                    <div class="popup-fields">

                        <label>Selection</label>
                        
                    </div>

                </div>

            </div>

        </div>

    <div id="footer-container"></div>
    <script>
   
        fetch('./components/navbar.html')
            .then(response => response.text())
            .then(data => {

                document.getElementById('navbar-container').innerHTML = data;

                const menuBtn = document.getElementById("menu-btn");
                const navLinks = document.getElementById("nav-links");

                menuBtn.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });

            });
    </script>
    <script>
    fetch('./components/footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        });
    </script>
    
</body>
</html>
