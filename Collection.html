<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="collection.css">
    <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
      <div id="navbar-container"></div>
    </header>

    <section class="collections-page">

    <div class="collections-header">
        <h1>Collections</h1>
        <div class="collections-line"></div>
    </div>

    <div class="collection-box beige">

        <div class="collection-image large">
            <img src="images/Warm Neutral Material Moodboard with Marble, Wood & Brass 2.png" alt="">
        </div>

        <div class="collection-content">
            <h2>
                Natural Stone & 
                Architectural 
                Surfaces
            </h2>

            <button>Explore Collection</button>
        </div>

    </div>
    <div class="collection-box reverse light">

        <div class="collection-image large">
            <img src="images/warm neutral material moodboard with marble, wood & brass 2 (1).png" alt="">

        </div>

        <div class="collection-content">
            <h2>
                Sanitaryware 
                & Bathroom 
                Fittings
            </h2>

            <button>Explore Collection</button>
        </div>

    </div>
    <div class="collection-box dark">

        <div class="collection-image large">
            <img src="images/Warm Neutral Material Moodboard with Marble, Wood & Brass 4.png" alt="">
        </div>

        <div class="collection-content">
            <h2>
                Technical 
                Infrastructure 
                & Installation 
                Services
            </h2>

            <button>Explore Collection</button>
        </div>

    </div>

</section>
<div id="footer-container"></div>
    <script>
   
        fetch('./components/navbar.html')
            .then(response => response.text())
            .then(data => {

                document.getElementById('navbar-container').innerHTML = data;

                const menuBtn = document.getElementById("menu-btn");
                const navLinks = document.getElementById("nav-links");

                menuBtn.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });

            });
    </script>
<script>
fetch('./components/footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-container').innerHTML = data;
    });
</script>
    
</body>
</html>
